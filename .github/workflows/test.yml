name: 🐢 海龟汤 - 临时测试

on:
  workflow_dispatch:
    inputs:
      duration:
        description: '运行时长（分钟）'
        required: true
        default: '10'

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 安装依赖
        run: npm install

      - name: 启动服务器
        run: |
          node server.js &
          sleep 3
          echo "✅ 服务已启动"

      - name: 创建公网隧道
        run: |
          curl -sLO https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
          chmod +x cloudflared-linux-amd64
          ./cloudflared-linux-amd64 tunnel --url http://localhost:3456 --no-autoupdate > /tmp/cf.log 2>&1 &
          sleep 10
          URL=$(grep -o 'https://[a-zA-Z0-9.-]*\.trycloudflare\.com' /tmp/cf.log | head -1)
          echo "=========================================="
          echo "🌐 公网地址: $URL"
          echo "⏱ 将在 ${{ github.event.inputs.duration }} 分钟后自动关闭"
          echo "=========================================="
          echo "PUBLIC_URL=$URL" >> $GITHUB_ENV

      - name: 保持运行
        run: |
          sleep $(( ${{ github.event.inputs.duration }} * 60 ))
          echo "⏰ 时间到，自动关闭"
