name: 🐢 海龟汤

on:
  workflow_dispatch:
    inputs:
      duration:
        description: '运行时长（分钟）'
        required: true
        default: '60'

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 安装并启动
        run: |
          npm install
          node server.js &
          sleep 3
          curl -s http://localhost:3456/api/soups | head -c 50
          echo " ✅"

      - name: 公网隧道
        run: |
          npx localtunnel --port 3456 > /tmp/lt.txt 2>&1 &
          sleep 12
          cat /tmp/lt.txt
          URL=$(grep -oP 'https://[a-zA-Z0-9.-]*\.loca\.lt' /tmp/lt.txt | head -1)
          echo "URL=$URL"
          echo "$URL" > public/tunnel_url.txt
          echo "🌐 $URL" >> $GITHUB_STEP_SUMMARY

      - name: 提交URL到仓库
        run: |
          git config user.name "bot"
          git config user.email "bot@turtle.soup"
          git add public/tunnel_url.txt
          git commit -m "🌐 $(cat public/tunnel_url.txt)" || true
          git push || true

      - name: 保持运行
        run: sleep $(( ${{ github.event.inputs.duration }} * 60 ))
