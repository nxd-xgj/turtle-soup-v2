name: 🐢 海龟汤 - 测试

on:
  workflow_dispatch:
    inputs:
      duration:
        description: '运行时长（分钟）'
        required: true
        default: '60'

permissions: write-all

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 安装并启动
        run: |
          npm install
          node server.js &
          sleep 3
          curl -s http://localhost:3456/api/soups 2>/dev/null | head -c 100
          echo " ✅ 服务就绪"

      - name: 隧道
        run: |
          # 安装 bore
          curl -sL https://github.com/ekzhang/bore/releases/download/v0.5.2/bore-v0.5.2-x86_64-unknown-linux-musl.tar.gz | tar xz
          ./bore local 3456 --to bore.pub > /tmp/bore.log 2>&1 &
          sleep 8
          cat /tmp/bore.log
          URL=$(grep -oP 'bore\.pub:\d+' /tmp/bore.log | head -1)
          echo "🌐 http://$URL" | tee public/tunnel_url.txt
          echo "🌐 http://$URL" >> $GITHUB_STEP_SUMMARY

      - name: 提交地址
        run: |
          URL=$(cat public/tunnel_url.txt)
          git config user.name "bot"
          git config user.email "bot@turtle.soup"
          git add public/tunnel_url.txt
          git commit -m "🌐 $URL" || true
          git push || true

      - name: 保持运行
        run: sleep $(( ${{ github.event.inputs.duration }} * 60 ))
