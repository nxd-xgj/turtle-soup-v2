name: 🐢 海龟汤 - 临时测试

on:
  workflow_dispatch:
    inputs:
      duration:
        description: '运行时长（分钟）'
        required: true
        default: '60'

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 安装依赖并启动
        run: |
          npm install
          node server.js &
          sleep 3
          curl -s http://localhost:3456/api/soups | head -c 100
          echo ""
          echo "✅ 服务已启动"

      - name: 🌐 公网隧道
        run: |
          npx localtunnel --port 3456 > /tmp/lt.txt 2>&1 &
          sleep 10
          URL=$(grep -o 'https://[a-zA-Z0-9.-]*\.loca\.lt' /tmp/lt.txt | head -1)
          cat /tmp/lt.txt
          echo ""
          echo "=============================================="
          echo "  公网地址: $URL"
          echo "  ⏱ 有效期: ${{ github.event.inputs.duration }} 分钟"
          echo "=============================================="
          echo "🌐 公网地址: $URL" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

      - name: ⏱ 保持运行
        run: sleep $(( ${{ github.event.inputs.duration }} * 60 ))
