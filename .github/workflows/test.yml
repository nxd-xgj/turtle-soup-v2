name: 🐢 海龟汤

on:
  workflow_dispatch:
    inputs:
      duration:
        description: '运行时长（分钟）'
        required: true
        default: '60'

permissions: write-all

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 安装并启动
        run: |
          npm install
          node server.js &
          sleep 3
          curl -s http://localhost:3456/api/soups | head -c 50
          echo " ✅"

      - name: 公网隧道
        run: |
          curl -sLO https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
          chmod +x cloudflared-linux-amd64
          ./cloudflared-linux-amd64 tunnel --url http://localhost:3456 --no-autoupdate > /tmp/cf.log 2>&1 &
          sleep 15
          URL=$(grep -oP 'https://[a-zA-Z0-9.-]*\.trycloudflare\.com' /tmp/cf.log | head -1)
          cat /tmp/cf.log
          echo ""
          echo "🌐 $URL"
          echo "$URL" > public/tunnel_url.txt
          echo "🌐 $URL" >> $GITHUB_STEP_SUMMARY

      - name: 提交URL到仓库
        run: |
          git config user.name "bot"
          git config user.email "bot@turtle.soup"
          git add public/tunnel_url.txt
          git commit -m "🌐 $(cat public/tunnel_url.txt)" || true
          git push || true

      - name: 保持运行
        run: sleep $(( ${{ github.event.inputs.duration }} * 60 ))
